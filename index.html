*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Nunito',sans-serif;overflow:hidden;user-select:none}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
  display:flex;justify-content:space-between;align-items:center;padding:10px 20px}
.hb{display:flex;flex-direction:column;align-items:center;min-width:70px}
.hl{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45)}
.hv{font-family:'Fredoka One',cursive;font-size:1.9rem;color:#fff;line-height:1;text-shadow:2px 2px 0 #000}
.hv.gold{color:#F2A900}
#lm{font-family:'Fredoka One',cursive;font-size:.95rem;color:#FFD700;text-shadow:1px 1px 0 #000;
  text-align:center;opacity:0;transition:opacity .4s;max-width:180px}
#pw{position:fixed;top:58px;left:16px;right:16px;height:5px;
  background:rgba(255,255,255,.12);border-radius:3px;z-index:100;overflow:hidden}
#pb{height:100%;width:0%;border-radius:3px;transition:width .3s;
  background:linear-gradient(to right,#2D68C4,#F2A900,#154733)}

/* Screens */
.screen{position:fixed;inset:0;z-index:200;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:24px 16px 40px;overflow-y:auto;gap:16px}
.screen h1{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#fff;
  text-align:center;line-height:1.1;text-shadow:3px 3px 0 rgba(0,0,0,.5);flex-shrink:0}
.screen h1 span{display:block;font-size:.9rem;color:#aaa;font-family:'Nunito',sans-serif;font-weight:400;margin-top:5px}
#hsbanner{font-family:'Fredoka One',cursive;font-size:1rem;color:#F2A900;text-shadow:1px 1px 0 #000;display:none;flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;width:100%;max-width:700px}
.card{background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.15);
  border-radius:16px;padding:16px 10px;display:flex;flex-direction:column;
  align-items:center;gap:7px;cursor:pointer;transition:all .18s;backdrop-filter:blur(10px)}
.card:hover,.card.focused{transform:translateY(-4px) scale(1.04);
  border-color:rgba(255,255,255,.45);box-shadow:0 14px 30px rgba(0,0,0,.45)}
.card.focused{outline:3px solid #FFD700;outline-offset:2px}
.ce{font-size:3rem;line-height:1}
.cn{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;text-align:center}
.cs{font-size:.68rem;color:#aaa;letter-spacing:1px;text-transform:uppercase;text-align:center;line-height:1.3}
.back-btn{font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 28px;
  background:rgba(255,255,255,.12);color:#fff;border:2px solid rgba(255,255,255,.25);
  border-radius:30px;cursor:pointer;flex-shrink:0;margin-top:4px}

/* Game over */

  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}

.go-row{display:flex;gap:40px}
.go-blk{text-align:center}
.go-lbl{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#aaa}
.go-val{font-family:'Fredoka One',cursive;font-size:2rem;color:#F2A900}

#hsbadge{font-family:'Fredoka One',cursive;font-size:.95rem;background:#4eff91;

#golm{color:#777;font-size:.9rem}
#playbtn{font-family:'Fredoka One',cursive;font-size:1.4rem;padding:13px 36px;

.enter-hint{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:-6px}

// ═══ ROUTE BUILDER ═══════════════════════════════════════════
let LANDMARKS=[];
function buildRoute(homeKey,destKey){
  const home=CITIES[homeKey], dest=CITIES[destKey];
  const segs=home.segs[destKey]||['plains'];
  const lms=[];
  lms.push({at:0,name:`${home.emoji} Leaving ${home.label.split(',')[0]}`,zone:segs[0]});
  const gap=Math.floor(150/Math.max(segs.length,1));
  const used=new Set();
  segs.forEach((z,i)=>{
    const wps=ZONE_WP[z]||['🗺️ Scenic Route'];
    const wp=wps.find(w=>!used.has(w))||wps[0];
    used.add(wp);
    const at=8+i*gap;
    if(at<155) lms.push({at,name:wp,zone:z});
  });
  lms.push({at:160,name:`${dest.emoji} ${dest.label.split(',')[0]} — You made it!`,zone:'finish'});
  return lms;
}
function getLM(sc){let r=LANDMARKS[0]||{at:0,zone:'midwest',name:''};for(const l of LANDMARKS)if(sc>=l.at)r=l;return r;}
function getZone(sc){return getLM(Math.max(0,sc)).zone;}
function getPal(sc){return PAL[getZone(sc)]||PAL.midwest;}
function globalDiff(sc){return Math.min(1,Math.floor(sc/DIFF_STEP)/DIFF_TIERS);}

function pickType(zone,score){
  const cfg=ZONE_CFG[zone]||ZONE_CFG.midwest;
  const total=cfg.types.reduce((s,[w])=>s+w,0);
  let r=Math.random()*total;
  for(const[w,t]of cfg.types){r-=w;if(r<=0)return t;}
  return 'safe';
}

// ═══ ROW FACTORY ═════════════════════════════════════════════
function makeRow(ri,score){
  const zone=getZone(Math.max(0,ri));
  const pal=PAL[zone]||PAL.midwest;
  const d=globalDiff(score);
  let type=(ri<=1)?'safe':pickType(zone,score);
  const row={type,rowIndex:ri,zone,pal,entities:[],speed:0,fish:[]};

  if(type==='road'||type==='freeway'){
    const fast=(type==='freeway');
    const spdMin=fast?(0.8+d*1.0):(0.5+d*0.8);
    const spdMax=fast?(1.4+d*2.2):(0.9+d*1.6);
    const spd=spdMin+Math.random()*(spdMax-spdMin);
    row.speed=spd*(Math.random()<.5?1:-1);
    const maxC=fast?Math.round(2+d*2.5):Math.round(1+d*2.5);
    const count=1+Math.floor(Math.random()*maxC);
    const vw=fast?(75+Math.random()*35):(58+Math.random()*28);
    const slotW=W/count;
    for(let i=0;i<count;i++){
      const maxOff=Math.max(0,slotW-vw-8);
      const x=i*slotW+(maxOff>0?Math.random()*maxOff:0)+vw/2;
      row.entities.push({x,w:vw,type:fast?'truck':'car',
        color:['#e53935','#1E88E5','#FDD835','#43A047','#FB8C00','#8E24AA'][Math.floor(Math.random()*6)]});
    }
  }
  if(type==='river'){
    const spdMin=0.4+d*0.3, spdMax=0.7+d*1.0;
    row.speed=(spdMin+Math.random()*(spdMax-spdMin))*(Math.random()<.5?1:-1);
    const count=Math.max(2,Math.round(3.5-d*1.5));
    const logW=Math.round(110-d*30+Math.random()*20);
    const slotW=W/count;
    for(let i=0;i<count;i++){
      const maxOff=Math.max(0,slotW-logW-8);
      const x=i*slotW+(maxOff>0?Math.random()*maxOff:0)+logW/2;
      row.entities.push({x,w:logW});
    }
    if(d>=0.33){
      const fc=Math.floor(1+(d-0.33)*4.5);
      for(let i=0;i<fc;i++){
        row.fish.push({x:Math.random()*W,t:-1,
          cooldown:2.5+Math.random()*(4-d*2),timer:1+Math.random()*3,
          dir:Math.random()<.5?1:-1,arcH:TILE*(1.2+Math.random()*.8),
          travelX:TILE*(1.5+Math.random())});
      }
    }
  }
  if(type==='train'){
    const spdMin=2.5+d*1.5, spdMax=3.5+d*3.0;
    const spd=spdMin+Math.random()*(spdMax-spdMin);
    const dir=Math.random()<.5?1:-1;
    row.speed=spd*dir;
    row.entities.push({x:dir>0?-(145):W+145,w:290,active:false,
      cooldown:Math.max(2.5,7-d*4.5)+Math.random()*2,timer:2+Math.random()*3});
  }
  return row;
}
function buildRows(fromRI,count,score){
  return Array.from({length:count},(_,i)=>makeRow(fromRI+i,score));
}

let sessionBest=0, gameActive=false, score=0;
let rows=[], playerRow=0, playerCol=Math.floor(COLS/2);

// ═══ AUDIO ════════════════════════════════════════════════════
let audioCtx=null, musicNodes={}, curMusicZone=null;
function s2f(b,s){return b*Math.pow(2,s/12);}
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function stopMusic(){
  if(!audioCtx)return;
  try{if(musicNodes.mg){musicNodes.mg.gain.setTargetAtTime(0,audioCtx.currentTime,.3);
    setTimeout(()=>{try{musicNodes.mg.disconnect();}catch(e){}},800);}}catch(e){}
  musicNodes={}; curMusicZone=null;
}
function playMusic(zone){
  if(!audioCtx||zone===curMusicZone)return;
  curMusicZone=zone;
  if(musicNodes.mg){const old=musicNodes.mg;old.gain.setTargetAtTime(0,audioCtx.currentTime,.5);
    setTimeout(()=>{try{old.disconnect();}catch(e){}},1500);}
  musicNodes={};
  const prof=MUSIC[zone]||MUSIC.midwest;
  const now=audioCtx.currentTime;
  const bs=60/prof.bpm;
  const mg=audioCtx.createGain();
  mg.gain.setValueAtTime(0,now); mg.gain.setTargetAtTime(.18,now,.8);
  mg.connect(audioCtx.destination); musicNodes.mg=mg;
  const comp=audioCtx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.ratio.value=4;comp.connect(mg);
  const dly=audioCtx.createDelay(.5);dly.delayTime.value=.18;
  const fb=audioCtx.createGain();fb.gain.value=.28;dly.connect(fb);fb.connect(dly);
  const dry=audioCtx.createGain();dry.gain.value=.65;dry.connect(comp);
  const wet=audioCtx.createGain();wet.gain.value=.35;dly.connect(wet);wet.connect(comp);
  const bass=audioCtx.createOscillator();bass.type='sine';bass.frequency.value=prof.freq/2;
  const bg=audioCtx.createGain();bg.gain.value=.35;bass.connect(bg);bg.connect(dry);bass.start(now);
  musicNodes.bass=bass;
  let st=now+.05,si=0;
  const ss=bs/(prof.tension<.4?2:prof.tension<.7?3:4);
  function arp(){
    if(!musicNodes.mg)return;
    const pat=[...prof.scale,...prof.scale.map(s=>s+12)];
    while(st<audioCtx.currentTime+.4){
      const o=audioCtx.createOscillator();o.type=prof.wave;
      o.frequency.value=s2f(prof.freq,pat[si%pat.length]);
      const e=audioCtx.createGain();e.gain.setValueAtTime(0,st);
      e.gain.linearRampToValueAtTime(.22,st+ss*.08);
      e.gain.setTargetAtTime(0,st+ss*.15,ss*.18);
      o.connect(e);e.connect(dry);o.start(st);o.stop(st+ss*.6);
      st+=ss;si++;
    }
    musicNodes._at=setTimeout(arp,200);
  }
  arp();
  function kick(t){
    if(!musicNodes.mg)return;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.15,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*.04))*.6;
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g=audioCtx.createGain();g.gain.value=.4+prof.tension*.3;
    s.connect(g);g.connect(comp);s.start(t);
    const nb=t+bs;musicNodes._kt=setTimeout(()=>kick(audioCtx.currentTime+(nb-audioCtx.currentTime)),Math.max(10,(nb-audioCtx.currentTime-.05)*1000));
  }
  kick(now+bs*.5);
  if(prof.tension>.45){
    function hat(t){
      if(!musicNodes.mg)return;
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.04,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*.008));
      const s=audioCtx.createBufferSource();s.buffer=buf;
      const hf=audioCtx.createBiquadFilter();hf.type='highpass';hf.frequency.value=8000;
      const g=audioCtx.createGain();g.gain.value=.15+prof.tension*.2;
      s.connect(hf);hf.connect(g);g.connect(comp);s.start(t);
      const nb=t+bs/2;musicNodes._ht=setTimeout(()=>hat(audioCtx.currentTime+(nb-audioCtx.currentTime)),Math.max(10,(nb-audioCtx.currentTime-.05)*1000));
    }
    hat(now+bs*.25);
  }
}
function playSplat(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  // Thud
  const tb=audioCtx.createBuffer(1,audioCtx.sampleRate*.18,audioCtx.sampleRate);
  const td=tb.getChannelData(0);
  for(let i=0;i<td.length;i++)td[i]=(Math.random()*2-1)*Math.exp(-i/audioCtx.sampleRate*28*.18/(.18));
  const ts=audioCtx.createBufferSource();ts.buffer=tb;
  const tlp=audioCtx.createBiquadFilter();tlp.type='lowpass';tlp.frequency.value=320;
  const tg=audioCtx.createGain();tg.gain.setValueAtTime(.9,now);tg.gain.exponentialRampToValueAtTime(.001,now+.18);
  ts.connect(tlp);tlp.connect(tg);tg.connect(audioCtx.destination);ts.start(now);
  // Boing
  const bo=audioCtx.createOscillator();bo.type='sine';
  bo.frequency.setValueAtTime(520,now+.01);bo.frequency.exponentialRampToValueAtTime(110,now+.35);
  const bg=audioCtx.createGain();bg.gain.setValueAtTime(.28,now+.01);bg.gain.exponentialRampToValueAtTime(.001,now+.35);
  bo.connect(bg);bg.connect(audioCtx.destination);bo.start(now+.01);bo.stop(now+.36);
}

// ═══ NAVIGATION ═══════════════════════════════════════════════
let navScreen='team', navIdx=0;
function getNavCards(){
  const id=navScreen==='dest'?'dest-grid':'team-grid';
  return Array.from(document.getElementById(id).querySelectorAll('.card'));
}
function navFocus(i){
  const cards=getNavCards();if(!cards.length)return;
  navIdx=((i%cards.length)+cards.length)%cards.length;
  cards.forEach((c,j)=>{
    c.classList.toggle('focused',j===navIdx);
    if(j===navIdx)c.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
}
function navActivate(){const c=getNavCards();if(c[navIdx])c[navIdx].click();}

// ═══ INPUT ════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  // Game over
  if((e.key==='Enter'||e.key===' ')&&document.getElementById('go').style.display==='flex'){
    e.preventDefault();resetGame();return;
  }
  // Selection screens
  if(navScreen==='team'||navScreen==='dest'){
    const cards=getNavCards();if(!cards.length)return;
    const cols=Math.max(1,Math.round((cards[0].parentElement.offsetWidth||W)/((cards[0].offsetWidth||140)+12)));
    if(e.key==='ArrowRight'){e.preventDefault();navFocus(navIdx+1);return;}
    if(e.key==='ArrowLeft'){e.preventDefault();navFocus(navIdx-1);return;}
    if(e.key==='ArrowDown'){e.preventDefault();navFocus(navIdx+cols);return;}
    if(e.key==='ArrowUp'){e.preventDefault();navFocus(navIdx-cols);return;}
    if(e.key==='Enter'||e.key===' '){e.preventDefault();navActivate();return;}
    if(e.key==='Escape'&&navScreen==='dest'){e.preventDefault();showScreen('team');return;}
    return;
  }
  // Gameplay
  const m={ArrowUp:[-1,0],w:[-1,0],W:[-1,0],ArrowDown:[1,0],s:[1,0],S:[1,0],
           ArrowLeft:[0,-1],a:[0,-1],A:[0,-1],ArrowRight:[0,1],d:[0,1],D:[0,1]};
  if(m[e.key]){e.preventDefault();qMove(...m[e.key]);}
});
let tx0=0,ty0=0;
canvas.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)<14&&Math.abs(dy)<14){qMove(-1,0);return;}
  Math.abs(dx)>Math.abs(dy)?qMove(0,dx>0?1:-1):qMove(dy<0?-1:1,0);
  e.preventDefault();
},{passive:false});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect(),sc=W/r.width;
  const cx=(e.clientX-r.left)*sc,cy=(e.clientY-r.top)*sc;
  const py=rowToScreenY(playerRow);
  const dx=cx-pxPx,dy=cy-py;
  Math.abs(dx)>Math.abs(dy)?qMove(0,dx>0?1:-1):qMove(dy<0?-1:1,0);
});
function qMove(dr,dc){if(!gameActive||player.dead)return;if(queue.length<2)queue.push({dr,dc});}

// ═══ SCREENS ══════════════════════════════════════════════════
let pendingTeam=null;
function showScreen(name){
  document.getElementById('screen-team').style.display=name==='team'?'flex':'none';
  document.getElementById('screen-dest').style.display=name==='dest'?'flex':'none';
  navScreen=name; navIdx=0;
  setTimeout(()=>navFocus(0),50);
}
function selectTeam(key){
  pendingTeam=key;
  const team=TEAMS[key];
  const homeCity=CITIES[team.city];
  // Build dest header
  document.getElementById('dest-header').innerHTML=
    `<div style="font-size:3rem">${team.emoji}</div>
     <div style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff">${team.name}</div>
     <div style="font-size:.8rem;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:4px">${homeCity.emoji} ${homeCity.label} — Where to?</div>
     <div style="font-family:'Fredoka One',cursive;font-size:.95rem;color:#FFD700;margin-top:6px">Choose your destination</div>`;
  // Build dest cards
  const grid=document.getElementById('dest-grid');
  grid.innerHTML='';
  for(const[ck,city]of Object.entries(CITIES)){

    card.className='card'; card.dataset.nav=ck;

    card.addEventListener('mouseenter',()=>{

document.getElementById('back-btn').addEventListener('click',()=>showScreen('team'));

// ═══ GAME LIFECYCLE ═══════════════════════════════════════════
function rowToScreenY(ri){return(VROWS-1-(ri-worldOff))*TILE+HALF;}
function snapPos(){pxPx=playerCol*TILE+HALF;tgX=pxPx;}

function startGame(teamKey,destKey){
  const team=TEAMS[teamKey];
  player.emoji=team.emoji;
  LANDMARKS=buildRoute(team.city,destKey);
  document.getElementById('screen-team').style.display='none';
  document.getElementById('screen-dest').style.display='none';
  navScreen='game';
  initAudio();
  initGame();
  gameActive=true;
  if(raf)cancelAnimationFrame(raf);
  lastTime=performance.now();
  raf=requestAnimationFrame(loop);
  playMusic(LANDMARKS[0].zone);
}

function initGame(){
  score=0;worldOff=0;scrollActive=false;scrollPos=0;dangerFlash=0;
  player.dead=false;player.onLog=null;player.bounce=0;player.deadRot=0;
  playerRow=0;playerCol=Math.floor(COLS/2);
  moving=false;moveProg=0;queue=[];lmTimer=0;
  rows=buildRows(-3,VROWS+30,0);
  snapPos();updateHUD();
}

function resetGame(){
  stopMusic();
  document.getElementById('go').style.display='none';
  if(sessionBest>0){document.getElementById('hsbanner').style.display='block';document.getElementById('hsval').textContent=sessionBest;}
  showScreen('team');
}

function killPlayer(){
  if(player.dead)return;
  player.dead=true;gameActive=false;
  playSplat();stopMusic();
  const isNew=score>sessionBest;
  if(isNew)sessionBest=score;
  document.getElementById('hbest').textContent=sessionBest;
  setTimeout(()=>{
    const go=document.getElementById('go');go.style.display='flex';
    document.getElementById('goscore').textContent=score;
    document.getElementById('gobest').textContent=sessionBest;
    document.getElementById('golm').textContent=getLM(score).name;
    document.getElementById('hsbadge').style.display=isNew?'block':'none';
    document.getElementById('gobest').classList.toggle('new',isNew);
  },800);
}

function updateHUD(){
  document.getElementById('hscore').textContent=score;
  document.getElementById('hbest').textContent=sessionBest;
  document.getElementById('pb').style.width=Math.min(100,(score/160)*100)+'%';
}
function flashLM(){
  const lm=getLM(score),prev=getLM(score-1);
  if(lm!==prev){
    const el=document.getElementById('lm');
    el.textContent=lm.name;el.style.opacity='1';lmTimer=200;
    playMusic(lm.zone);
  }
}

// ═══ MOVE ═════════════════════════════════════════════════════
function getRow(ri){return rows.find(r=>r.rowIndex===ri)||null;}
function spawnMore(){
  const mx=Math.max(...rows.map(r=>r.rowIndex));
  rows.push(...buildRows(mx+1,8,score));
  rows=rows.filter(r=>r.rowIndex>=worldOff-5);
}
function doMove(){
  if(moving||queue.length===0||player.dead)return;
  const{dr,dc}=queue.shift();
  playerRow=playerRow-dr;
  playerCol=Math.max(0,Math.min(COLS-1,playerCol+dc));
  if(playerRow>score){score=playerRow;updateHUD();flashLM();if(score>=SCROLL_AFTER)scrollActive=true;}
  while((playerRow-worldOff)>VROWS-4){worldOff++;spawnMore();}
  if(playerRow<worldOff)playerRow=worldOff;
  player.bounce=1;player.onLog=null;
  fmX=pxPx;tgX=playerCol*TILE+HALF;moving=true;moveProg=0;
}

// ═══ COLLISION ════════════════════════════════════════════════
function checkCollision(){
  const row=getRow(playerRow);if(!row)return;
  if(row.type==='river'){
    let onLog=null;
    outer:for(const e of row.entities)for(const ox of[0,-W,W])if(Math.abs(pxPx-(e.x+ox))<e.w/2+12){onLog=e;break outer;}
    player.onLog=onLog;
    if(!onLog){killPlayer();return;}
    if(row.fish){
      const py=rowToScreenY(playerRow);
      for(const f of row.fish){
        if(f.t<0)continue;
        const arc=Math.sin(f.t*Math.PI);
        if(arc<0.15)continue;
        const fx=((f.x+f.dir*f.travelX*f.t)%W+W)%W;
        const fy=py-arc*f.arcH;
        for(const ox of[0,-W,W])if(Math.abs(pxPx-(fx+ox))<22&&Math.abs(py-fy)<22){killPlayer();return;}
      }
    }
    return;
  }
  player.onLog=null;
  if(row.type==='road'||row.type==='freeway'){
    for(const e of row.entities)for(const ox of[0,-W,W])if(Math.abs(pxPx-(e.x+ox))<e.w/2+8){killPlayer();return;}
  }
  if(row.type==='train'){
    for(const e of row.entities)if(e.active&&Math.abs(pxPx-e.x)<e.w/2+6){killPlayer();return;}
  }
}

// ═══ DRAW ═════════════════════════════════════════════════════
function withWraps(x,w,fn){
  fn(x);
  if(x-w/2<20)fn(x+W);
  if(x+w/2>W-20)fn(x-W);
}
function drawVehicle(e,spd,y){
  const dir=spd>=0?1:-1;
  withWraps(e.x,e.w,x=>{
    if(x+e.w/2<0||x-e.w/2>W)return;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(x-e.w/2+5,y+TILE-9,e.w,6);
    ctx.fillStyle=e.color;ctx.beginPath();ctx.roundRect(x-e.w/2,y+11,e.w,TILE-23,7);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.15)';
    const rX=e.type==='truck'?x-e.w/2+24:x-e.w/2+12,rW=e.type==='truck'?e.w-30:e.w-22;
    ctx.beginPath();ctx.roundRect(rX,y+11,rW,15,[4,4,0,0]);ctx.fill();
    ctx.fillStyle='rgba(200,235,255,.8)';
    const wsX=dir>0?x+e.w/2-(e.type==='truck'?30:22):x-e.w/2+4;
    ctx.fillRect(wsX,y+14,e.type==='truck'?22:16,11);
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(x-e.w/2+12,y+TILE-12,7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+e.w/2-12,y+TILE-12,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFFDE7';
    ctx.beginPath();ctx.arc(dir>0?x+e.w/2-5:x-e.w/2+5,y+22,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}
function drawLog(e,y){
  withWraps(e.x,e.w,x=>{
    if(x+e.w/2<0||x-e.w/2>W)return;
    ctx.save();
    ctx.fillStyle='#6D4C41';ctx.beginPath();ctx.roundRect(x-e.w/2,y+17,e.w,TILE-34,10);ctx.fill();
    ctx.fillStyle='#8D6E63';
    ctx.beginPath();ctx.ellipse(x-e.w/2+3,y+TILE/2,4,(TILE-34)/2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+e.w/2-3,y+TILE/2,4,(TILE-34)/2,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#5D4037';ctx.lineWidth=1.5;
    for(let lx=x-e.w/2+13;lx<x+e.w/2-6;lx+=12){ctx.beginPath();ctx.moveTo(lx,y+19);ctx.lineTo(lx,y+TILE-19);ctx.stroke();}
    ctx.restore();
  });
}
function drawTrain(e,spd,y){
  const x=e.x,dir=spd>=0?1:-1;
  if(x+145<0||x-145>W)return;
  ctx.save();
  ctx.fillStyle='#B71C1C';ctx.fillRect(x-145,y+6,290,TILE-12);
  ctx.fillStyle='#D32F2F';ctx.fillRect(x-145,y+6,290,10);
  const cx=dir>0?x+145-55:x-145;
  ctx.fillStyle='#C62828';ctx.fillRect(cx,y+6,55,TILE-12);
  ctx.fillStyle='rgba(200,235,255,.72)';
  for(let wx=x-145+20;wx<x+145-28;wx+=40)ctx.fillRect(wx,y+14,24,14);
  ctx.fillStyle='#FFFF8D';
  ctx.beginPath();ctx.arc(dir>0?x+136:x-136,y+TILE/2,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFCC02';ctx.fillRect(x-145,y+TILE-17,290,5);
  ctx.fillStyle='#212121';
  for(let wx=x-145+16;wx<x+145-12;wx+=45){ctx.beginPath();ctx.arc(wx,y+TILE-8,7,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}
function drawRow(row,sr){
  const y=sr*TILE,pal=row.pal;
  if(row.type==='safe'){
    ctx.fillStyle=pal.ground;ctx.fillRect(0,y,W,TILE);
    const icons=DECOR[row.zone]||DECOR.midwest;
    ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    for(let i=0;i<COLS;i+=2)ctx.fillText(icons[Math.floor(i/2)%icons.length],i*TILE+HALF,y+HALF);
    return;
  }
  if(row.type==='road'||row.type==='freeway'){
    ctx.fillStyle=pal.road;ctx.fillRect(0,y,W,TILE);
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.setLineDash([20,18]);ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,y+HALF);ctx.lineTo(W,y+HALF);ctx.stroke();ctx.setLineDash([]);
    for(const e of row.entities)drawVehicle(e,row.speed,y);
    return;
  }
  if(row.type==='river'){
    const g=ctx.createLinearGradient(0,y,0,y+TILE);
    g.addColorStop(0,'#1565C0');g.addColorStop(1,'#0D47A1');
    ctx.fillStyle=g;ctx.fillRect(0,y,W,TILE);
    ctx.strokeStyle='rgba(255,255,255,.11)';ctx.lineWidth=1.5;
    const t=Date.now()/1000;
    for(let rx=0;rx<W+50;rx+=46){const ox=((t*15+rx)%W+W)%W;ctx.beginPath();ctx.arc(ox,y+HALF,13,0,Math.PI);ctx.stroke();}
    for(const e of row.entities)drawLog(e,y);
    if(row.fish.length){
      ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      for(const f of row.fish){
        if(f.t<0)continue;
        const arc=Math.sin(f.t*Math.PI);
        const fx=((f.x+f.dir*f.travelX*f.t)%W+W)%W;
        const fy=y+HALF-arc*f.arcH;
        const angle=f.dir*(arc<.5?-.6:.6);
        for(const ox of[0,fx<30?W:(fx>W-30?-W:null)].filter(v=>v!==null)){
          ctx.save();ctx.translate(fx+ox,fy);ctx.rotate(angle);ctx.globalAlpha=.92;
          ctx.fillText('🐟',0,0);
          if(arc<.12||arc>.88){ctx.globalAlpha=.4;ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();}
          ctx.restore();
        }
      }
    }
    return;
  }
  if(row.type==='train'){
    ctx.fillStyle='#3E2723';ctx.fillRect(0,y,W,TILE);
    ctx.strokeStyle='#9E9E9E';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,y+18);ctx.lineTo(W,y+18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,y+TILE-18);ctx.lineTo(W,y+TILE-18);ctx.stroke();
    ctx.strokeStyle='#5D4037';ctx.lineWidth=2.5;
    for(let tx=0;tx<W;tx+=28){ctx.beginPath();ctx.moveTo(tx,y+12);ctx.lineTo(tx,y+TILE-12);ctx.stroke();}
    for(const e of row.entities)if(e.active)drawTrain(e,row.speed,y);
    return;
  }
}
function drawPlayer(px,py){
  ctx.save();
  const bY=player.bounce>0?-Math.sin(player.bounce*Math.PI)*10:0;
  py+=bY;
  if(player.dead){
    player.deadRot=Math.min(player.deadRot+.07,Math.PI/2);
    ctx.translate(px,py);ctx.rotate(player.deadRot);ctx.translate(-px,-py);
    ctx.globalAlpha=Math.max(.2,1-player.deadRot*1.7);
  }
  ctx.fillStyle='rgba(255,255,255,.96)';
  ctx.beginPath();ctx.arc(px,py,TILE*.37,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=2;ctx.stroke();
  ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=10;ctx.shadowOffsetY=4;
  ctx.font=`${TILE*.54}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(player.emoji,px,py+2);
  ctx.restore();
  if(player.bounce>0)player.bounce=Math.max(0,player.bounce-.07);
}

// ═══ MAIN LOOP ════════════════════════════════════════════════
function loop(ts){
  const dt=Math.min((ts-lastTime)/16.67,2.5);
  lastTime=ts;

  // Auto-scroll
  if(gameActive&&scrollActive&&!player.dead){
    const d=globalDiff(score);
    scrollPos+=SCROLL_BASE*(1+d*3.5)*dt;
    const nwo=Math.floor(scrollPos);
    while(worldOff<nwo){worldOff++;spawnMore();}
    if(playerRow<worldOff){killPlayer();}
    const rab=playerRow-worldOff;
    const frac=scrollPos-worldOff;
    dangerFlash=(rab<=1||(rab===2&&frac>.5))?Math.min(1,dangerFlash+.10*dt):Math.max(0,dangerFlash-.05*dt);
  }

  // Update entities
  for(const row of rows){
    if(!row.speed)continue;
    const spd=row.speed;
    if(row.type==='train'){
      const e=row.entities[0];
      if(e.active){
        e.x+=spd*dt;
        if(spd>0?e.x-145>W+20:e.x+145<-20){e.active=false;e.timer=e.cooldown;}
      } else {
        e.timer-=dt/60;
        if(e.timer<=0){e.active=true;e.x=spd>0?-(145+5):W+145+5;}
      }
      continue;
    }
    for(const e of row.entities){e.x+=spd*dt*.85;e.x=((e.x%W)+W)%W;}
    if(row.type==='river'&&row.rowIndex===playerRow&&player.onLog){
      pxPx+=spd*dt*.85;pxPx=Math.max(HALF,Math.min(W-HALF,pxPx));tgX=pxPx;
    }
    // Fish
    for(const f of row.fish){
      if(f.t<0){f.timer-=dt/60;if(f.timer<=0)f.t=0;}
      else{
        f.t+=dt*.022*(1+globalDiff(score)*.8);
        if(f.t>=1){f.t=-1;f.timer=f.cooldown;f.x=((f.x+f.dir*f.travelX)%W+W)%W;}
      }
    }
  }

  // Player X movement
  if(moving){
    moveProg=Math.min(1,moveProg+.22*dt);
    const t=moveProg<.5?2*moveProg*moveProg:-1+(4-2*moveProg)*moveProg;
    pxPx=fmX+(tgX-fmX)*t;
    if(moveProg>=1){pxPx=tgX;moving=false;}
  } else {doMove();}

  if(!player.dead&&!moving)checkCollision();
  if(lmTimer>0){lmTimer-=dt;if(lmTimer<=0)document.getElementById('lm').style.opacity='0';}

  // Render
  ctx.clearRect(0,0,W,H);
  const pal=getPal(score);
  const shift=(scrollPos-worldOff)*TILE;
  ctx.save();
  ctx.translate(0,shift);
  ctx.fillStyle=pal.ground;ctx.fillRect(0,-TILE,W,H+TILE*2);
  const sg=ctx.createLinearGradient(0,-TILE,0,H*.35);
  sg.addColorStop(0,pal.sky);sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,-TILE,W,H*.35+TILE);
  for(let sr=-1;sr<=VROWS;sr++){const row=getRow(worldOff+sr);if(row)drawRow(row,VROWS-1-sr);}
  drawPlayer(pxPx,rowToScreenY(playerRow));
  ctx.restore();

  // Danger flash
  if(dangerFlash>0){
    const pulse=.5+.5*Math.sin(ts/100);
    const alpha=dangerFlash*pulse*.52;
    ctx.save();
    const vg=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.82);
    vg.addColorStop(0,'rgba(200,0,0,0)');vg.addColorStop(1,`rgba(200,0,0,${alpha.toFixed(3)})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    if(dangerFlash>.3){ctx.globalAlpha=Math.min(1,(dangerFlash-.3)*2)*pulse;ctx.fillStyle='#ff2222';ctx.fillRect(0,H-6,W,6);ctx.fillRect(0,0,W,6);}
    ctx.restore();
  }
  raf=requestAnimationFrame(loop);
}

// ═══ BUILD TEAM CARDS ═════════════════════════════════════════
(function(){
  const grid=document.getElementById('team-grid');
  for(const[key,team]of Object.entries(TEAMS)){
    const city=CITIES[team.city];
    const card=document.createElement('div');
    card.className='card';card.dataset.nav=key;card.style.borderColor=team.color;
    card.innerHTML=`<div class="ce">${team.emoji}</div><div class="cn">${team.name}</div><div class="cs">${team.school}<br>${city.label}</div>`;
    card.addEventListener('mouseenter',()=>{
      const i=getNavCards().indexOf(card);if(i>=0){navIdx=i;navFocus(i);}
      card.style.background=team.color+'22';card.style.boxShadow=`0 14px 30px ${team.glow}`;
    });
    card.addEventListener('mouseleave',()=>{card.style.background='';card.style.boxShadow='';});
    card.addEventListener('click',()=>selectTeam(key));
    grid.appendChild(card);
  }
  navScreen='team';navIdx=0;setTimeout(()=>navFocus(0),50);
})();
</script>
